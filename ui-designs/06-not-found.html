<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — InkMuse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
          colors: {
            background: '#FAFAFA',
            foreground: '#0F172A',
            muted: '#F1F5F9',
            'muted-foreground': '#64748B',
            border: '#E2E8F0',
            card: '#FFFFFF',
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; background-color: #FAFAFA; color: #0F172A; }
    .btn-primary { background-color: #0F172A; color: white; transition: all 150ms ease; }
    .btn-primary:hover { background-color: #1E293B; }
  </style>
</head>
<body class="min-h-screen flex flex-col">
  <header class="py-6 px-8">
    <div class="max-w-5xl mx-auto">
      <a href="01-homepage.html" class="flex items-center gap-2 w-fit">
        <i data-lucide="pen-tool" class="w-5 h-5 text-gray-900"></i>
        <span class="text-lg font-medium tracking-tight">InkMuse</span>
      </a>
    </div>
  </header>

  <main class="flex-1 flex items-center justify-center">
    <div class="text-center">
      <h1 class="text-8xl font-light text-[#0F172A] mb-6 tracking-tight">404</h1>
      <div class="w-12 h-12 mx-auto mb-6 flex items-center justify-center">
        <i data-lucide="book-x" class="w-8 h-8 text-[#64748B]"></i>
      </div>
      <h2 class="text-lg font-medium text-[#0F172A] mb-2">页面不存在</h2>
      <p class="text-sm text-[#64748B] mb-8 max-w-xs mx-auto">你访问的页面可能已被移除，或者地址输入有误。</p>
      <a href="01-homepage.html" class="btn-primary px-6 py-2.5 rounded-lg text-sm inline-flex items-center gap-2">
        <i data-lucide="arrow-left" class="w-4 h-4"></i>
        返回首页
      </a>
    </div>
  </main>

  <script>lucide.createIcons();</script>
</body>
</html>
