<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>设置 — InkMuse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
          colors: {
            background: '#FAFAFA',
            foreground: '#0F172A',
            muted: '#F1F5F9',
            'muted-foreground': '#64748B',
            border: '#E2E8F0',
            card: '#FFFFFF',
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; background-color: #FAFAFA; color: #0F172A; }
    .btn-primary { background-color: #0F172A; color: white; transition: all 150ms ease; }
    .btn-primary:hover { background-color: #1E293B; }
    .btn-secondary { background-color: transparent; border: 1px solid #E2E8F0; color: #0F172A; transition: all 150ms ease; }
    .btn-secondary:hover { background-color: #F1F5F9; }
    .nav-item { transition: all 150ms ease; cursor: pointer; }
    .nav-item:hover { background-color: #F1F5F9; }
    .nav-item.active { background-color: #F1F5F9; font-weight: 500; color: #0F172A; }
    .provider-card { transition: all 150ms ease; }
    .provider-card:hover { background-color: #F8FAFC; }
    .settings-content { display: none; }
    .settings-content.active { display: block; }
    input[type="text"]:focus, input[type="password"]:focus, input[type="number"]:focus, select:focus { border-color: #0F172A; outline: none; }
    .toggle { position: relative; width: 36px; height: 20px; background-color: #E2E8F0; border-radius: 10px; cursor: pointer; transition: all 150ms ease; flex-shrink: 0; }
    .toggle.active { background-color: #0F172A; }
    .toggle::after { content: ''; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; background: white; border-radius: 50%; transition: all 150ms ease; }
    .toggle.active::after { left: 18px; }
  </style>
</head>
<body>
  <!-- Header -->
  <header class="py-6 px-8">
    <div class="max-w-5xl mx-auto flex items-center justify-between">
      <a href="01-homepage.html" class="flex items-center gap-2">
        <i data-lucide="pen-tool" class="w-5 h-5 text-gray-900"></i>
        <span class="text-lg font-medium tracking-tight">InkMuse</span>
      </a>
      <nav class="flex items-center gap-8">
        <a href="01-homepage.html" class="text-sm text-gray-500 hover:text-gray-900 transition-colors">仪表盘</a>
        <a href="05-settings.html" class="text-sm text-gray-900">设置</a>
      </nav>
    </div>
  </header>

  <!-- Main Content -->
  <main class="max-w-5xl mx-auto px-8 pb-16">
    <!-- Title -->
    <div class="flex items-center gap-3 mb-8">
      <i data-lucide="settings" class="w-6 h-6 text-[#64748B]"></i>
      <h1 class="text-3xl font-light tracking-tight">设置</h1>
    </div>

    <!-- Two-column layout -->
    <div class="flex gap-8">
      <!-- Sidebar Navigation -->
      <nav class="w-48 flex-shrink-0">
        <div class="space-y-1">
          <button class="nav-item active w-full text-left px-3 py-2 rounded-lg text-sm flex items-center gap-2" onclick="switchSettingsTab('providers', this)">
            <i data-lucide="cpu" class="w-4 h-4"></i>
            AI 供应商
          </button>
          <button class="nav-item w-full text-left px-3 py-2 rounded-lg text-sm text-[#64748B] flex items-center gap-2" onclick="switchSettingsTab('appearance', this)">
            <i data-lucide="palette" class="w-4 h-4"></i>
            外观
            <span class="ml-auto text-[10px] text-[#64748B]">即将推出</span>
          </button>
          <button class="nav-item w-full text-left px-3 py-2 rounded-lg text-sm text-[#64748B] flex items-center gap-2" onclick="switchSettingsTab('notifications', this)">
            <i data-lucide="bell" class="w-4 h-4"></i>
            通知
            <span class="ml-auto text-[10px] text-[#64748B]">即将推出</span>
          </button>
          <button class="nav-item w-full text-left px-3 py-2 rounded-lg text-sm text-[#64748B] flex items-center gap-2" onclick="switchSettingsTab('language', this)">
            <i data-lucide="languages" class="w-4 h-4"></i>
            语言
            <span class="ml-auto text-[10px] text-[#64748B]">即将推出</span>
          </button>
        </div>
      </nav>

      <!-- Content Area -->
      <div class="flex-1">
        <!-- AI Providers -->
        <div id="settings-providers" class="settings-content active">
          <!-- Provider 1: OpenAI (enabled) -->
          <div class="provider-card bg-white border border-[#E2E8F0] rounded-lg p-6 mb-4">
            <div class="flex items-center justify-between mb-4">
              <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-lg bg-[#F1F5F9] flex items-center justify-center">
                  <i data-lucide="cpu" class="w-5 h-5 text-[#0F172A]"></i>
                </div>
                <div>
                  <h3 class="text-sm font-medium">OpenAI</h3>
                  <p class="text-xs text-[#64748B]">GPT-4o</p>
                </div>
              </div>
              <div class="toggle active" onclick="this.classList.toggle('active')"></div>
            </div>
            <div class="grid grid-cols-2 gap-4">
              <div>
                <label class="block text-xs text-[#64748B] mb-1">Base URL</label>
                <input type="text" class="w-full px-3 py-2 border border-[#E2E8F0] rounded-md text-sm" value="https://api.openai.com/v1">
              </div>
              <div>
                <label class="block text-xs text-[#64748B] mb-1">API Key</label>
                <input type="password" class="w-full px-3 py-2 border border-[#E2E8F0] rounded-md text-sm" value="sk-xxxxxxxxxxxx">
              </div>
              <div>
                <label class="block text-xs text-[#64748B] mb-1">超时 (秒)</label>
                <input type="number" class="w-full px-3 py-2 border border-[#E2E8F0] rounded-md text-sm" value="30">
              </div>
              <div>
                <label class="block text-xs text-[#64748B] mb-1">优先级</label>
                <input type="number" class="w-full px-3 py-2 border border-[#E2E8F0] rounded-md text-sm" value="1">
              </div>
            </div>
          </div>

          <!-- Provider 2: Anthropic (disabled) -->
          <div class="provider-card bg-white border border-[#E2E8F0] rounded-lg p-6 mb-4">
            <div class="flex items-center justify-between mb-4">
              <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-lg bg-[#F1F5F9] flex items-center justify-center">
                  <i data-lucide="cpu" class="w-5 h-5 text-[#64748B]"></i>
                </div>
                <div>
                  <h3 class="text-sm font-medium">Anthropic</h3>
                  <p class="text-xs text-[#64748B]">Claude 3.5 Sonnet</p>
                </div>
              </div>
              <div class="toggle" onclick="this.classList.toggle('active')"></div>
            </div>
            <div class="grid grid-cols-2 gap-4 opacity-60">
              <div>
                <label class="block text-xs text-[#64748B] mb-1">Base URL</label>
                <input type="text" class="w-full px-3 py-2 border border-[#E2E8F0] rounded-md text-sm" value="https://api.anthropic.com/v1">
              </div>
              <div>
                <label class="block text-xs text-[#64748B] mb-1">API Key</label>
                <input type="password" class="w-full px-3 py-2 border border-[#E2E8F0] rounded-md text-sm" value="sk-ant-xxxxxxxx">
              </div>
              <div>
                <label class="block text-xs text-[#64748B] mb-1">超时 (秒)</label>
                <input type="number" class="w-full px-3 py-2 border border-[#E2E8F0] rounded-md text-sm" value="60">
              </div>
              <div>
                <label class="block text-xs text-[#64748B] mb-1">优先级</label>
                <input type="number" class="w-full px-3 py-2 border border-[#E2E8F0] rounded-md text-sm" value="2">
              </div>
            </div>
          </div>

          <!-- Add Provider Button -->
          <button class="btn-secondary w-full py-3 rounded-lg text-sm inline-flex items-center justify-center gap-2">
            <i data-lucide="plus" class="w-4 h-4"></i>
            添加供应商
          </button>
        </div>

        <!-- Appearance -->
        <div id="settings-appearance" class="settings-content">
          <div class="text-center py-20 text-[#64748B]">
            <i data-lucide="palette" class="w-12 h-12 mx-auto mb-4 opacity-30"></i>
            <p class="text-sm">外观设置即将推出</p>
            <p class="text-xs text-[#64748B] mt-1">包括主题、字体大小等个性化选项</p>
          </div>
        </div>

        <!-- Notifications -->
        <div id="settings-notifications" class="settings-content">
          <div class="text-center py-20 text-[#64748B]">
            <i data-lucide="bell" class="w-12 h-12 mx-auto mb-4 opacity-30"></i>
            <p class="text-sm">通知设置即将推出</p>
            <p class="text-xs text-[#64748B] mt-1">自定义 AI 生成完成、项目更新等通知</p>
          </div>
        </div>

        <!-- Language -->
        <div id="settings-language" class="settings-content">
          <div class="text-center py-20 text-[#64748B]">
            <i data-lucide="languages" class="w-12 h-12 mx-auto mb-4 opacity-30"></i>
            <p class="text-sm">语言设置即将推出</p>
            <p class="text-xs text-[#64748B] mt-1">支持中文、英文等多语言界面</p>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script>
    function switchSettingsTab(tabName, btn) {
      document.querySelectorAll('.settings-content').forEach(el => {
        el.classList.remove('active');
      });
      document.getElementById('settings-' + tabName).classList.add('active');
      document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }

    lucide.createIcons();
  </script>
</body>
</html>
